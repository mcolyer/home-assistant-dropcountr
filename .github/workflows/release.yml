name: "Release"

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v7"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/dropcountr"
          zip dropcountr.zip -r ./

      - name: "Create GitHub release and upload ZIP"
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ${{ github.workspace }}/custom_components/dropcountr/dropcountr.zip
          generate_release_notes: true
